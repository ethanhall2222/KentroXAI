project_name: sample-trusted-ai-project
risk_tier: medium
output_dir: artifacts
system:
  created_at: 2026-03-04 16:17:35.765463+00:00
  system_id: sample-trusted-ai-system
  system_name: Sample Trusted AI System
  version: 1.0.0
  model_provider: OpenAI
  model_name: gpt-4.1-mini
  model_version: api-managed
  environment: staging
  risk_level: medium
  compliance_profile: internal
  telemetry_level: standard
  deployment_region: us-east-1
  owner: responsible-ai-team
  metadata:
    intended_use: Evaluate governance shell and workflows
    limitations: Synthetic records for demonstration
    change_ticket: DEMO-100
    data_classification: internal
data:
  dataset_name: sample_customer_data
  source: local_csv
  sensitive_features:
  - gender
  - age_bucket
  intended_use: Evaluate governance shell and workflows
  limitations: Synthetic records for demonstration
model:
  model_name: sample_classifier
  version: 0.1.0
  owner: responsible-ai-team
  task: classification
  intended_use: Internal policy and quality checks
  limitations: Not production-grade
  known_failures:
  - Edge cases may be unstable
eval:
  suites:
  - rag_live
  metrics:
  - reliability
  - groundedness_stub
  - context_relevance_tfidf
  - output_support_tfidf
  - lexical_grounding_precision
  - claim_support_rate
  - unsupported_claim_rate
  - contradiction_rate
  - evidence_sufficiency_score
  - bias_signal_score
  benchmark_registry_path: benchmarks/openai_metric_registry.json
  thresholds:
    reliability: 0.75
    groundedness_stub: 0.18
    context_relevance_tfidf: 0.12
    output_support_tfidf: 0.12
    lexical_grounding_precision: 0.18
    claim_support_rate: 0.45
    unsupported_claim_rate: 0.4
    contradiction_rate: 0.2
    evidence_sufficiency_score: 0.4
    bias_signal_score: 0.8
xai:
  reasoning_report_template: reasoning_report.md.j2
  include_sections:
  - Overview / Intended Use
  - Data Summary
  - Model Summary
  - Key Risks & Mitigations
  - Evaluation Summary
  - Explainability Approach
  - Limitations / Open Questions
  - References
redteam:
  suites:
  - baseline
  cases:
  - RT-02
  - data_exfiltration_attempt
  - system_prompt_leakage
  severity_threshold: high
monitoring:
  enabled: true
  telemetry_path: telemetry.jsonl
  run_id: null
governance:
  risk_gate_rules:
    low:
      require_redteam: false
      block_on_high_severity: false
    medium:
      require_redteam: true
      block_on_high_severity: true
    high:
      require_redteam: true
      block_on_high_severity: true
      require_human_signoff: true
  required_stage_gates:
  - evaluation
  - redteam
  - documentation
  - monitoring
adapters:
  provider: openai_compatible
  endpoint: https://api.openai.com/v1
  deployment: null
  api_version: null
  model: gpt-4.1-mini
  embedding_model: text-embedding-3-small
  api_key_env: OPENAI_API_KEY
  request_format: responses
  timeout_seconds: 60
artifact_policy:
  required_outputs_by_risk_tier:
    low:
    - prompt_run.json
    - eval_results.json
    - reasoning_report.md
    - scorecard.md
    - scorecard.html
    - scorecard.json
    - telemetry.jsonl
    medium:
    - prompt_run.json
    - eval_results.json
    - redteam_findings.json
    - monitoring_summary.json
    - reasoning_report.md
    - lineage_report.md
    - authoritative_data_index.json
    - system_card.md
    - data_card.md
    - model_card.md
    - scorecard.md
    - scorecard.html
    - scorecard.json
    - artifact_manifest.json
    - telemetry.jsonl
    high:
    - prompt_run.json
    - eval_results.json
    - redteam_findings.json
    - monitoring_summary.json
    - reasoning_report.md
    - lineage_report.md
    - authoritative_data_index.json
    - incident_report.md
    - system_card.md
    - data_card.md
    - model_card.md
    - scorecard.md
    - scorecard.html
    - scorecard.json
    - artifact_manifest.json
    - telemetry.jsonl
